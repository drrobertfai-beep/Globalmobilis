    <circle cx="60" cy="60" r="52" fill="url(#gm-shine-h)"/>
    <g stroke="#FFFFFF" stroke-width="1.4" fill="none" opacity="0.45" stroke-linecap="round">
      <line x1="8" y1="60" x2="112" y2="60"/>
      <ellipse cx="60" cy="60" rx="52" ry="20"/>
      <ellipse cx="60" cy="60" rx="52" ry="38"/>
      <line x1="60" y1="8" x2="60" y2="112"/>
      <ellipse cx="60" cy="60" rx="20" ry="52"/>
      <ellipse cx="60" cy="60" rx="38" ry="52"/>
    </g>
    <path d="M 18 86 Q 60 4 102 38" fill="none" stroke="#F4B860" stroke-width="6.5" stroke-linecap="round"/>
    <circle cx="18" cy="86" r="7" fill="#F47B53"/>
    <circle cx="18" cy="86" r="7" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif"
