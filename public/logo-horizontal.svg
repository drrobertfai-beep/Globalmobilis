<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Global Mobilis">
  <title>Global Mobilis</title>
  <defs>
    <linearGradient id="gm-globe-h" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E4F8B"/>
      <stop offset="55%" stop-color="#1B7A9B"/>
      <stop offset="100%" stop-color="#0FA3A3"/>
    </linearGradient>
    <radialGradient id="gm-shine-h" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Icon -->
  <g>
