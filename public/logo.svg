<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Global Mobilis mark">
  <title>Global Mobilis</title>
  <defs>
    <!-- Brand gradient: deep ocean blue to vibrant teal, evoking sunrise over water -->
    <linearGradient id="gm-globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E4F8B"/>
      <stop offset="55%" stop-color="#1B7A9B"/>
      <stop offset="100%" stop-color="#0FA3A3"/>
    </linearGradient>
    <!-- Subtle inner highlight for the globe sphere -->
    <radialGradient id="gm-shine" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Globe sphere -->
  <circle cx="60" cy="60" r="52" fill="url(#gm-globe)"/>
  <circle cx="60" cy="60" r="52" fill="url(#gm-shine)"/>

  <!-- Globe grid: equator + two latitude bands -->
  <g stroke="#FFFFFF" stroke-width="1.4" fill="none" opacity="0.45" stroke-linecap="round">
    <line x1="8" y1="60" x2="112" y2="60"/>
    <ellipse cx="60" cy="60" rx="52" ry="20"/>
    <ellipse cx="60" cy="60" rx="52" ry="38"/>
  </g>

  <!-- Globe grid: meridian + two longitude bands -->
  <g stroke="#FFFFFF" stroke-width="1.4" fill="none" opacity="0.45" stroke-linecap="round">
    <line x1="60" y1="8" x2="60" y2="112"/>
    <ellipse cx="60" cy="60" rx="20" ry="52"/>
    <ellipse cx="60" cy="60" rx="38" ry="52"/>
  </g>

  <!-- Journey arc: a golden swoosh that wraps the globe, representing movement and connection -->
  <path d="M 18 86 Q 60 4 102 38"
        fill="none"
        stroke="#F4B860"
        stroke-width="6.5"
        stroke-linecap="round"/>

  <!-- Start marker (the traveler / "you") — warm coral dot at the journey's origin -->
  <circle cx="18" cy="86" r="7" fill="#F47B53"/>
  <circle cx="18" cy="86" r="7" fill="none" stroke="#FFFFFF" stroke-width="2"/>
</svg>
