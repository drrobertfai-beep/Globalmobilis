<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Global Mobilis favicon">
  <title>Global Mobilis</title>
  <defs>
    <linearGradient id="gm-globe-sm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E4F8B"/>
      <stop offset="55%" stop-color="#1B7A9B"/>
      <stop offset="100%" stop-color="#0FA3A3"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background (works as app icon and favicon) -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#gm-globe-sm)"/>
  <!-- Simplified globe grid for small sizes -->
  <g stroke="#FFFFFF" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round">
    <line x1="8" y1="32" x2="56" y2="32"/>
    <ellipse cx="32" cy="32" rx="24" ry="9"/>
    <line x1="32" y1="8" x2="32" y2="56"/>
    <ellipse cx="32" cy="32" rx="9" ry="24"/>
  </g>
  <!-- Journey arc -->
  <path d="M 12 48 Q 32 8 52 22" fill="none" stroke="#F4B860" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Start dot -->
  <circle cx="12" cy="48" r="4" fill="#F47B53"/>
  <circle cx="12" cy="48" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
</svg>
